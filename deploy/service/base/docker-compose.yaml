services:
  easy-proxy-monorepo-service:
    build:
      context: ../../..
      dockerfile: deploy/service/base/Dockerfile
    image: ${EASY_PROXY_SERVICE_IMAGE:-easyproxy/easy-proxy-monorepo-service:local}
    container_name: easy-proxy-monorepo-service
    restart: unless-stopped
    cpus: 1.50
    mem_limit: 512m
    ports:
      - "22323:22323"
      - "29888:29888"
      - "25000-25500:25000-25500"
    volumes:
      - ./config.yaml:/etc/easy-proxy/config.yaml
      - ./data:/var/lib/easy-proxy
    dns:
      - 1.1.1.1
      - 8.8.8.8
      - 223.5.5.5
    networks:
      easyproxy-service-network:
        aliases:
          - easy-proxy-service

    # Optional file-based node source:
    # - ./nodes.txt:/etc/easy-proxy/nodes.txt

    # Notes:
    # - 22323: pool listener
    # - 29888: management API and WebUI
    # - 25000-25500: multi-port range for multi-port/hybrid mode
    # - image also contains /usr/local/bin/ech-workers for connector runtime
    # - image also contains /usr/local/bin/cfst + /usr/local/share/cfst/ip.txt
    #   for local preferred Cloudflare entry-IP generation

networks:
  easyproxy-service-network:
    name: ${EASY_PROXY_SERVICE_NETWORK:-EasyAiMi}
    external: true

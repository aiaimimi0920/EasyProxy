name: Deploy Cloudflare Apps

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

'on':
  workflow_dispatch:
    inputs:
      target:
        description: Which Cloudflare target to deploy
        required: true
        default: both
        type: choice
        options:
          - both
          - misub-pages
          - ech-workers-cloudflare
          - aggregator-seed-relay
      deployment_mode:
        description: Bootstrap missing resources or update existing resources
        required: true
        default: update
        type: choice
        options:
          - bootstrap
          - update
      misub_branch:
        description: Branch name recorded for the MiSub Pages deployment
        required: false
        default: main
        type: string
      misub_project_name:
        description: MiSub Cloudflare Pages project name
        required: false
        default: misub-git
        type: string
      run_verification:
        description: Verify the deployed Cloudflare targets after publish
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  deployments: write

jobs:
  preflight:
    name: Deploy preflight validation
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: service/base/go.mod
          cache-dependency-path: service/base/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: upstreams/misub/package-lock.json

      - name: Install Python test dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install PyYAML tqdm requests websockets

      - name: Run root script smoke tests
        shell: pwsh
        run: |
          python -m unittest discover -s "tests" -p "test_*.py" -v

      - name: Run aggregator regression tests
        shell: pwsh
        run: |
          python -m unittest discover -s "upstreams/aggregator/tests" -p "test_*.py" -v

      - name: Install MiSub test dependencies
        shell: pwsh
        working-directory: upstreams/misub
        run: |
          npm ci

      - name: Run MiSub unit tests
        shell: pwsh
        working-directory: upstreams/misub
        run: |
          npm run test:run

      - name: Run service/base monitor tests
        shell: pwsh
        working-directory: service/base
        run: |
          go test ./internal/monitor

      - name: Run service/base boxmgr tests
        shell: pwsh
        working-directory: service/base
        run: |
          go test ./internal/boxmgr

      - name: Run service/base config tests
        shell: pwsh
        working-directory: service/base
        run: |
          go test ./internal/config

      - name: Run service/base subscription tests
        shell: pwsh
        working-directory: service/base
        run: |
          go test ./internal/subscription

  deploy-misub-pages:
    name: Deploy MiSub Pages
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ inputs.target == 'both' || inputs.target == 'misub-pages' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: upstreams/misub/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Assert MiSub deployment secrets
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_AUTH_EMAIL: ${{ secrets.CLOUDFLARE_AUTH_EMAIL }}
          CLOUDFLARE_GLOBAL_API_KEY: ${{ secrets.CLOUDFLARE_GLOBAL_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MISUB_ADMIN_PASSWORD: ${{ secrets.MISUB_ADMIN_PASSWORD }}
          MISUB_COOKIE_SECRET: ${{ secrets.MISUB_COOKIE_SECRET }}
          MISUB_MANIFEST_TOKEN: ${{ secrets.MISUB_MANIFEST_TOKEN }}
          MISUB_PUBLIC_URL: ${{ vars.EASYPROXY_MISUB_PUBLIC_URL }}
          MISUB_CALLBACK_URL: ${{ vars.EASYPROXY_MISUB_CALLBACK_URL }}
        run: |
          set -euo pipefail
          for name in CLOUDFLARE_ACCOUNT_ID MISUB_ADMIN_PASSWORD MISUB_COOKIE_SECRET MISUB_MANIFEST_TOKEN MISUB_PUBLIC_URL MISUB_CALLBACK_URL; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::$name is required for MiSub Pages deployment."
              exit 1
            fi
          done
          if [[ -z "${CLOUDFLARE_API_TOKEN:-}" ]]; then
            if [[ -z "${CLOUDFLARE_AUTH_EMAIL:-}" || -z "${CLOUDFLARE_GLOBAL_API_KEY:-}" ]]; then
              echo "::error::Provide either CLOUDFLARE_API_TOKEN or CLOUDFLARE_AUTH_EMAIL+CLOUDFLARE_GLOBAL_API_KEY for MiSub deployment."
              exit 1
            fi
          fi

      - name: Install MiSub dependencies
        working-directory: upstreams/misub
        run: npm ci

      - name: Build MiSub
        working-directory: upstreams/misub
        run: npm run build

      - name: Resolve MiSub Cloudflare resources
        id: misub_resources
        shell: bash
        working-directory: upstreams/misub
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_AUTH_EMAIL }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_GLOBAL_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MISUB_PUBLIC_URL: ${{ vars.EASYPROXY_MISUB_PUBLIC_URL }}
          MISUB_CALLBACK_URL: ${{ vars.EASYPROXY_MISUB_CALLBACK_URL }}
          MISUB_D1_DATABASE_NAME: ${{ vars.EASYPROXY_MISUB_D1_DATABASE_NAME }}
          MISUB_D1_DATABASE_BINDING: ${{ vars.EASYPROXY_MISUB_D1_DATABASE_BINDING }}
        run: |
          set -euo pipefail
          mode="${{ inputs.deployment_mode }}"
          project_name="${{ inputs.misub_project_name }}"
          branch_name="${{ inputs.misub_branch }}"
          db_name="${MISUB_D1_DATABASE_NAME:-$project_name}"
          db_binding="${MISUB_D1_DATABASE_BINDING:-MISUB_DB}"

          if [[ "$mode" == "bootstrap" ]]; then
            set +e
            npx wrangler pages project create "$project_name" --production-branch "$branch_name"
            create_status=$?
            set -e
            if [[ $create_status -ne 0 ]]; then
              echo "pages project create returned ${create_status}; continuing in case the project already exists"
            fi
          fi

          d1_list_json="$(npx wrangler d1 list --json)"
          db_id="$(printf '%s' "$d1_list_json" | python -c "import json,sys; name=sys.argv[1]; items=json.load(sys.stdin); print(next((str(item.get('uuid') or item.get('id') or '').strip() for item in items if str(item.get('name','')).strip()==name), ''))" "$db_name")"

          if [[ -z "$db_id" && "$mode" == "bootstrap" ]]; then
            create_db_json="$(npx wrangler d1 create "$db_name" --json)"
            db_id="$(printf '%s' "$create_db_json" | python -c "import json,sys; payload=json.load(sys.stdin); print(str(payload.get('uuid') or payload.get('id') or '').strip())")"
          fi

          if [[ -z "$db_id" ]]; then
            echo "::error::Failed to resolve a D1 database id for ${db_name}. Use bootstrap mode to create it or pre-create the database in Cloudflare."
            exit 1
          fi

          runtime_config_path="${RUNNER_TEMP}/misub-wrangler.runtime.jsonc"
          python "${GITHUB_WORKSPACE}/scripts/materialize-misub-wrangler.py" \
            --base-config "${GITHUB_WORKSPACE}/upstreams/misub/wrangler.jsonc" \
            --output "$runtime_config_path" \
            --project-name "$project_name" \
            --public-url "${MISUB_PUBLIC_URL}" \
            --callback-url "${MISUB_CALLBACK_URL}" \
            --d1-binding "$db_binding" \
            --d1-database-name "$db_name" \
            --d1-database-id "$db_id"

          echo "project_name=$project_name" >> "$GITHUB_OUTPUT"
          echo "branch_name=$branch_name" >> "$GITHUB_OUTPUT"
          echo "database_name=$db_name" >> "$GITHUB_OUTPUT"
          echo "database_id=$db_id" >> "$GITHUB_OUTPUT"
          echo "runtime_config_path=$runtime_config_path" >> "$GITHUB_OUTPUT"

      - name: Apply MiSub runtime wrangler config
        shell: bash
        run: |
          set -euo pipefail
          cp "${{ steps.misub_resources.outputs.runtime_config_path }}" upstreams/misub/wrangler.jsonc

      - name: Sync MiSub Pages secrets
        shell: bash
        working-directory: upstreams/misub
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_AUTH_EMAIL }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_GLOBAL_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT_NAME: ${{ steps.misub_resources.outputs.project_name }}
          MISUB_ADMIN_PASSWORD: ${{ secrets.MISUB_ADMIN_PASSWORD }}
          MISUB_COOKIE_SECRET: ${{ secrets.MISUB_COOKIE_SECRET }}
          MISUB_MANIFEST_TOKEN: ${{ secrets.MISUB_MANIFEST_TOKEN }}
        run: |
          set -euo pipefail
          printf "%s" "${MISUB_ADMIN_PASSWORD}" | npx wrangler pages secret put ADMIN_PASSWORD --project-name "$PROJECT_NAME"
          printf "%s" "${MISUB_COOKIE_SECRET}" | npx wrangler pages secret put COOKIE_SECRET --project-name "$PROJECT_NAME"
          printf "%s" "${MISUB_MANIFEST_TOKEN}" | npx wrangler pages secret put MANIFEST_TOKEN --project-name "$PROJECT_NAME"

      - name: Deploy MiSub Pages
        id: deploy_misub
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          workingDirectory: upstreams/misub
          command: >-
            pages deploy dist
            --project-name=${{ steps.misub_resources.outputs.project_name }}
            --branch=${{ steps.misub_resources.outputs.branch_name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_AUTH_EMAIL }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_GLOBAL_API_KEY }}

      - name: Verify MiSub Pages deployment
        if: ${{ inputs.run_verification }}
        shell: bash
        env:
          MISUB_PUBLIC_URL: ${{ vars.EASYPROXY_MISUB_PUBLIC_URL }}
          MISUB_ADMIN_PASSWORD: ${{ secrets.MISUB_ADMIN_PASSWORD }}
          MISUB_MANIFEST_TOKEN: ${{ secrets.MISUB_MANIFEST_TOKEN }}
          MISUB_MANIFEST_PROFILE_ID: ${{ vars.EASYPROXY_MISUB_MANIFEST_PROFILE_ID }}
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install requests PyYAML
          if [[ "${{ steps.misub_resources.outputs.branch_name }}" == "${{ inputs.misub_branch }}" && "${{ steps.misub_resources.outputs.branch_name }}" == "main" ]]; then
            base_url="https://${{ steps.misub_resources.outputs.project_name }}.pages.dev"
          else
            base_url="${{ steps.deploy_misub.outputs['pages-deployment-alias-url'] }}"
            if [[ -z "$base_url" ]]; then
              base_url="${{ steps.deploy_misub.outputs['deployment-url'] }}"
            fi
            if [[ -z "$base_url" ]]; then
              base_url="${MISUB_PUBLIC_URL}"
            fi
          fi
          python scripts/verify-misub-deploy.py \
            --base-url "${base_url}" \
            --admin-password "${MISUB_ADMIN_PASSWORD}" \
            --manifest-token "${MISUB_MANIFEST_TOKEN}" \
            --manifest-profile-id "${MISUB_MANIFEST_PROFILE_ID:-default}"

      - name: MiSub deploy summary
        shell: bash
        run: |
          {
            echo "## MiSub Pages deploy completed"
            echo
            echo "- mode: \`${{ inputs.deployment_mode }}\`"
            echo "- project: \`${{ steps.misub_resources.outputs.project_name }}\`"
            echo "- branch: \`${{ steps.misub_resources.outputs.branch_name }}\`"
            echo "- d1 database: \`${{ steps.misub_resources.outputs.database_name }}\`"
            echo "- d1 database id: \`${{ steps.misub_resources.outputs.database_id }}\`"
            echo "- deployment url: \`${{ steps.deploy_misub.outputs['deployment-url'] || 'n/a' }}\`"
            echo "- preview alias: \`${{ steps.deploy_misub.outputs['pages-deployment-alias-url'] || 'n/a' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-ech-workers-cloudflare:
    name: Deploy ech-workers-cloudflare
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ inputs.target == 'both' || inputs.target == 'ech-workers-cloudflare' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Assert Worker deployment secrets
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_AUTH_EMAIL: ${{ secrets.CLOUDFLARE_AUTH_EMAIL }}
          CLOUDFLARE_GLOBAL_API_KEY: ${{ secrets.CLOUDFLARE_GLOBAL_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ECH_TOKEN: ${{ secrets.ECH_TOKEN }}
          ECH_WORKER_PUBLIC_URL: ${{ vars.EASYPROXY_ECH_WORKER_PUBLIC_URL }}
        run: |
          set -euo pipefail
          for name in CLOUDFLARE_ACCOUNT_ID ECH_TOKEN ECH_WORKER_PUBLIC_URL; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::$name is required for ech-workers-cloudflare deployment."
              exit 1
            fi
          done
          if [[ -z "${CLOUDFLARE_API_TOKEN:-}" ]]; then
            if [[ -z "${CLOUDFLARE_AUTH_EMAIL:-}" || -z "${CLOUDFLARE_GLOBAL_API_KEY:-}" ]]; then
              echo "::error::Provide either CLOUDFLARE_API_TOKEN or CLOUDFLARE_AUTH_EMAIL+CLOUDFLARE_GLOBAL_API_KEY for worker deployment."
              exit 1
            fi
          fi

      - name: Sync ech-workers-cloudflare secret
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_AUTH_EMAIL }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_GLOBAL_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ECH_TOKEN: ${{ secrets.ECH_TOKEN }}
        run: |
          set -euo pipefail
          printf "%s" "${ECH_TOKEN}" | npx wrangler secret put ECH_TOKEN --config workers/ech-workers-cloudflare/wrangler.jsonc

      - name: Deploy ech-workers-cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config workers/ech-workers-cloudflare/wrangler.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_AUTH_EMAIL }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_GLOBAL_API_KEY }}

      - name: Verify ech-workers-cloudflare deployment
        if: ${{ inputs.run_verification }}
        shell: bash
        env:
          ECH_WORKER_PUBLIC_URL: ${{ vars.EASYPROXY_ECH_WORKER_PUBLIC_URL }}
          ECH_TOKEN: ${{ secrets.ECH_TOKEN }}
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install requests websockets
          python scripts/verify-ech-worker-deploy.py \
            --base-url "${ECH_WORKER_PUBLIC_URL}" \
            --token "${ECH_TOKEN}"

      - name: Worker deploy summary
        shell: bash
        run: |
          {
            echo "## ech-workers-cloudflare deploy completed"
            echo
            echo "- mode: \`${{ inputs.deployment_mode }}\`"
            echo "- worker config: \`workers/ech-workers-cloudflare/wrangler.jsonc\`"
            echo "- public url: \`${{ vars.EASYPROXY_ECH_WORKER_PUBLIC_URL || 'n/a' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-aggregator-seed-relay:
    name: Deploy aggregator seed relay
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ inputs.target == 'both' || inputs.target == 'aggregator-seed-relay' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Assert relay deployment secrets
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_AUTH_EMAIL: ${{ secrets.CLOUDFLARE_AUTH_EMAIL }}
          CLOUDFLARE_GLOBAL_API_KEY: ${{ secrets.CLOUDFLARE_GLOBAL_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ISSUE91_UPSTREAM_URL_B64: ${{ secrets.EASYPROXY_AGGREGATOR_ISSUE91_UPSTREAM_URL_B64 }}
          RELAY_URL: ${{ vars.EASYPROXY_AGGREGATOR_ISSUE91_RELAY_URL }}
        run: |
          set -euo pipefail
          for name in CLOUDFLARE_ACCOUNT_ID ISSUE91_UPSTREAM_URL_B64 RELAY_URL; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::$name is required for aggregator seed relay deployment."
              exit 1
            fi
          done
          if [[ -z "${CLOUDFLARE_API_TOKEN:-}" ]]; then
            if [[ -z "${CLOUDFLARE_AUTH_EMAIL:-}" || -z "${CLOUDFLARE_GLOBAL_API_KEY:-}" ]]; then
              echo "::error::Provide either CLOUDFLARE_API_TOKEN or CLOUDFLARE_AUTH_EMAIL+CLOUDFLARE_GLOBAL_API_KEY for relay deployment."
              exit 1
            fi
          fi

      - name: Sync relay upstream secret
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_AUTH_EMAIL }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_GLOBAL_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ISSUE91_UPSTREAM_URL_B64: ${{ secrets.EASYPROXY_AGGREGATOR_ISSUE91_UPSTREAM_URL_B64 }}
        run: |
          set -euo pipefail
          printf "%s" "${ISSUE91_UPSTREAM_URL_B64}" | npx wrangler secret put ISSUE91_UPSTREAM_URL_B64 --config workers/aggregator-seed-relay/wrangler.jsonc

      - name: Deploy aggregator seed relay
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config workers/aggregator-seed-relay/wrangler.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_AUTH_EMAIL }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_GLOBAL_API_KEY }}

      - name: Verify aggregator seed relay deployment
        if: ${{ inputs.run_verification }}
        shell: bash
        env:
          RELAY_URL: ${{ vars.EASYPROXY_AGGREGATOR_ISSUE91_RELAY_URL }}
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install requests PyYAML
          python scripts/verify-aggregator-seed-relay.py --base-url "${RELAY_URL%/issue91}"

      - name: Relay deploy summary
        shell: bash
        run: |
          {
            echo "## aggregator seed relay deploy completed"
            echo
            echo "- mode: \`${{ inputs.deployment_mode }}\`"
            echo "- worker config: \`workers/aggregator-seed-relay/wrangler.jsonc\`"
            echo "- relay url: \`${{ vars.EASYPROXY_AGGREGATOR_ISSUE91_RELAY_URL || 'n/a' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  sync-misub-ech-profile:
    name: Sync MiSub ECH connector profile
    runs-on: ubuntu-latest
    needs:
      - deploy-misub-pages
      - deploy-ech-workers-cloudflare
    if: ${{ always() && (inputs.target == 'both' || inputs.target == 'misub-pages' || inputs.target == 'ech-workers-cloudflare') && (needs.deploy-misub-pages.result == 'success' || needs.deploy-misub-pages.result == 'skipped') && (needs.deploy-ech-workers-cloudflare.result == 'success' || needs.deploy-ech-workers-cloudflare.result == 'skipped') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Synchronize MiSub connector manifest profile
        shell: bash
        env:
          DEPLOY_TARGET: ${{ inputs.target }}
          AGGREGATOR_EFFECTIVE_URL: ${{ vars.EASYPROXY_AGGREGATOR_EFFECTIVE_URL }}
          MISUB_PUBLIC_URL: ${{ vars.EASYPROXY_MISUB_PUBLIC_URL }}
          MISUB_ADDITIONAL_SUBSCRIPTIONS_JSON: ${{ vars.EASYPROXY_MISUB_ADDITIONAL_SUBSCRIPTIONS_JSON }}
          MISUB_ADMIN_PASSWORD: ${{ secrets.MISUB_ADMIN_PASSWORD }}
          MISUB_MANIFEST_TOKEN: ${{ secrets.MISUB_MANIFEST_TOKEN }}
          MISUB_CONNECTOR_PROFILE_ID: ${{ vars.EASYPROXY_MISUB_CONNECTOR_PROFILE_ID }}
          MISUB_MANIFEST_PROFILE_ID: ${{ vars.EASYPROXY_MISUB_MANIFEST_PROFILE_ID }}
          ECH_WORKER_PUBLIC_URL: ${{ vars.EASYPROXY_ECH_WORKER_PUBLIC_URL }}
          ECH_TOKEN: ${{ secrets.ECH_TOKEN }}
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install requests PyYAML

          if [[ -z "${MISUB_PUBLIC_URL:-}" || -z "${MISUB_ADMIN_PASSWORD:-}" || -z "${MISUB_MANIFEST_TOKEN:-}" || -z "${ECH_WORKER_PUBLIC_URL:-}" || -z "${ECH_TOKEN:-}" || -z "${AGGREGATOR_EFFECTIVE_URL:-}" ]]; then
            echo "::error::MiSub profile sync requires MISUB_PUBLIC_URL, MISUB_ADMIN_PASSWORD, MISUB_MANIFEST_TOKEN, ECH_WORKER_PUBLIC_URL, ECH_TOKEN, and AGGREGATOR_EFFECTIVE_URL."
            exit 1
          fi

          connector_profile_id="${MISUB_CONNECTOR_PROFILE_ID:-easyproxies-ech-runtime}"
          runtime_profile_id="${MISUB_MANIFEST_PROFILE_ID:-aggregator-global}"

          if ! python -c "import os, requests, sys; base=os.environ['MISUB_PUBLIC_URL'].rstrip('/') + '/'; response=requests.get(base, timeout=20); response.raise_for_status()"
          then
            if [[ "${DEPLOY_TARGET}" == "ech-workers-cloudflare" ]]; then
              echo "::warning::MiSub is not reachable yet; skipping connector profile sync during ech-workers-only deployment."
              exit 0
            fi
            echo "::error::MiSub public URL is not reachable, cannot synchronize connector profile."
            exit 1
          fi

          python - <<'PY'
          import json
          import os
          import subprocess
          import sys

          command = [
              sys.executable,
              "scripts/sync-misub-runtime-sources.py",
              "--base-url", os.environ["MISUB_PUBLIC_URL"],
              "--admin-password", os.environ["MISUB_ADMIN_PASSWORD"],
              "--manifest-token", os.environ["MISUB_MANIFEST_TOKEN"],
              "--profile-id", os.environ.get("MISUB_MANIFEST_PROFILE_ID", "aggregator-global"),
              "--profile-name", "Aggregator Global",
              "--subscription-url", os.environ["AGGREGATOR_EFFECTIVE_URL"],
          ]

          extras = json.loads(os.environ.get("MISUB_ADDITIONAL_SUBSCRIPTIONS_JSON") or "[]")
          if not isinstance(extras, list):
              raise SystemExit("MISUB_ADDITIONAL_SUBSCRIPTIONS_JSON must be a JSON array")
          for item in extras:
              value = str(item or "").strip()
              if value:
                  command.extend(["--subscription-url", value])

          completed = subprocess.run(command, check=False)
          raise SystemExit(completed.returncode)
          PY

          python scripts/sync-misub-ech-profile.py \
            --base-url "${MISUB_PUBLIC_URL}" \
            --admin-password "${MISUB_ADMIN_PASSWORD}" \
            --manifest-token "${MISUB_MANIFEST_TOKEN}" \
            --profile-id "${connector_profile_id}" \
            --legacy-profile-id "easyproxies-ech-test" \
            --remove-profile-id "easyproxies-ech-preferred" \
            --profile-name "EasyProxies ECH Runtime" \
            --profile-description "Private profile for routing EasyProxy-managed ECH connector sources through the current self-hosted ECH Worker; host-local preferred IP fanout is generated on each EasyProxy runtime independently." \
            --worker-url "${ECH_WORKER_PUBLIC_URL}:443" \
            --access-token "${ECH_TOKEN}"

      - name: MiSub connector profile sync summary
        shell: bash
        run: |
          {
            echo "## MiSub ECH connector profile synchronized"
            echo
            echo "- runtime profile id: \`${{ vars.EASYPROXY_MISUB_CONNECTOR_PROFILE_ID || 'easyproxies-ech-runtime' }}\`"
            echo "- MiSub base URL: \`${{ vars.EASYPROXY_MISUB_PUBLIC_URL || 'n/a' }}\`"
            echo "- ECH worker URL: \`${{ vars.EASYPROXY_ECH_WORKER_PUBLIC_URL || 'n/a' }}:443\`"
            echo "- preferred IP fanout: generated per-host by EasyProxy; not published through MiSub"
          } >> "$GITHUB_STEP_SUMMARY"

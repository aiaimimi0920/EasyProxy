name: Deploy Cloudflare Apps

'on':
  workflow_dispatch:
    inputs:
      target:
        description: Which Cloudflare target to deploy
        required: true
        default: both
        type: choice
        options:
          - both
          - misub-pages
          - ech-workers-cloudflare
      misub_branch:
        description: Branch name recorded for the MiSub Pages deployment
        required: false
        default: main
        type: string
      misub_project_name:
        description: MiSub Cloudflare Pages project name
        required: false
        default: misub-git
        type: string

permissions:
  contents: read
  deployments: write

jobs:
  preflight:
    name: Deploy preflight validation
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: service/base/go.mod
          cache-dependency-path: service/base/go.sum

      - name: Install Python test dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install PyYAML tqdm

      - name: Run root script smoke tests
        shell: pwsh
        run: |
          python -m unittest discover -s "tests" -p "test_*.py" -v

      - name: Run aggregator regression tests
        shell: pwsh
        run: |
          python -m unittest discover -s "upstreams/aggregator/tests" -p "test_*.py" -v

      - name: Run service/base monitor tests
        shell: pwsh
        working-directory: service/base
        run: |
          go test ./internal/monitor

      - name: Run service/base boxmgr tests
        shell: pwsh
        working-directory: service/base
        run: |
          go test ./internal/boxmgr

      - name: Run service/base config tests
        shell: pwsh
        working-directory: service/base
        run: |
          go test ./internal/config

  deploy-misub-pages:
    name: Deploy MiSub Pages
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ inputs.target == 'both' || inputs.target == 'misub-pages' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: upstreams/misub/package-lock.json

      - name: Assert MiSub deployment secrets
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MISUB_ADMIN_PASSWORD: ${{ secrets.MISUB_ADMIN_PASSWORD }}
          MISUB_COOKIE_SECRET: ${{ secrets.MISUB_COOKIE_SECRET }}
          MISUB_MANIFEST_TOKEN: ${{ secrets.MISUB_MANIFEST_TOKEN }}
        run: |
          set -euo pipefail
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID MISUB_ADMIN_PASSWORD MISUB_COOKIE_SECRET MISUB_MANIFEST_TOKEN; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::$name is required for MiSub Pages deployment."
              exit 1
            fi
          done

      - name: Install MiSub dependencies
        working-directory: upstreams/misub
        run: npm ci

      - name: Build MiSub
        working-directory: upstreams/misub
        run: npm run build

      - name: Sync MiSub Pages secrets
        shell: bash
        working-directory: upstreams/misub
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT_NAME: ${{ inputs.misub_project_name }}
          MISUB_ADMIN_PASSWORD: ${{ secrets.MISUB_ADMIN_PASSWORD }}
          MISUB_COOKIE_SECRET: ${{ secrets.MISUB_COOKIE_SECRET }}
          MISUB_MANIFEST_TOKEN: ${{ secrets.MISUB_MANIFEST_TOKEN }}
        run: |
          set -euo pipefail
          for name in MISUB_ADMIN_PASSWORD MISUB_COOKIE_SECRET MISUB_MANIFEST_TOKEN; do
            value="${!name}"
            printf "%s" "$value" | npx wrangler pages secret put "$name" --project-name "$PROJECT_NAME" --config wrangler.jsonc
          done

      - name: Deploy MiSub Pages
        id: deploy_misub
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: >-
            pages deploy upstreams/misub/dist
            --project-name=${{ inputs.misub_project_name }}
            --branch=${{ inputs.misub_branch }}
            --config upstreams/misub/wrangler.jsonc

      - name: MiSub deploy summary
        shell: bash
        run: |
          {
            echo "## MiSub Pages deploy completed"
            echo
            echo "- project: \`${{ inputs.misub_project_name }}\`"
            echo "- branch: \`${{ inputs.misub_branch }}\`"
            echo "- deployment url: \`${{ steps.deploy_misub.outputs['deployment-url'] || 'n/a' }}\`"
            echo "- preview alias: \`${{ steps.deploy_misub.outputs['pages-deployment-alias-url'] || 'n/a' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-ech-workers-cloudflare:
    name: Deploy ech-workers-cloudflare
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ inputs.target == 'both' || inputs.target == 'ech-workers-cloudflare' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Assert Worker deployment secrets
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ECH_TOKEN: ${{ secrets.ECH_TOKEN }}
        run: |
          set -euo pipefail
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID ECH_TOKEN; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::$name is required for ech-workers-cloudflare deployment."
              exit 1
            fi
          done

      - name: Deploy ech-workers-cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config workers/ech-workers-cloudflare/wrangler.jsonc
          secrets: |
            ECH_TOKEN
        env:
          ECH_TOKEN: ${{ secrets.ECH_TOKEN }}

      - name: Worker deploy summary
        shell: bash
        run: |
          {
            echo "## ech-workers-cloudflare deploy completed"
            echo
            echo "- worker config: \`workers/ech-workers-cloudflare/wrangler.jsonc\`"
          } >> "$GITHUB_STEP_SUMMARY"

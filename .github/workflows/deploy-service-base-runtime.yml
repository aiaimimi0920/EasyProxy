name: Deploy Service Base Runtime

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "release-*"
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to deploy
        required: true
        type: string
      runtime_root:
        description: Optional absolute runtime root on the deployment host
        required: false
        type: string
      network_name:
        description: Optional Docker network name override
        required: false
        type: string
      wait_minutes:
        description: Minutes to wait for the GHCR image to become pullable
        required: false
        default: "35"
        type: string

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    name: Deploy EasyProxy runtime from GHCR
    runs-on:
      - self-hosted
      - windows
    timeout-minutes: 90
    concurrency:
      group: easyproxy-runtime-deploy
      cancel-in-progress: false
    env:
      EASYPROXY_ROOT_CONFIG_YAML_B64: ${{ secrets.EASYPROXY_ROOT_CONFIG_YAML_B64 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve Python executable
        shell: pwsh
        run: |
          $configuredPython = "${{ vars.EASYPROXY_SERVICE_DEPLOY_PYTHON }}"
          $candidates = New-Object System.Collections.Generic.List[string]
          if (-not [string]::IsNullOrWhiteSpace($configuredPython)) {
            $null = $candidates.Add($configuredPython)
          }
          foreach ($candidate in @(
            'C:\Users\vmjcv\scoop\shims\python.exe'
            'C:\Python313\python.exe'
            'C:\Python312\python.exe'
            'C:\Python311\python.exe'
            'C:\Python310\python.exe'
          )) {
            $null = $candidates.Add($candidate)
          }
          $cmd = Get-Command python -ErrorAction SilentlyContinue
          if ($null -ne $cmd -and -not [string]::IsNullOrWhiteSpace($cmd.Source)) {
            $null = $candidates.Add($cmd.Source)
          }
          $pythonExecutable = $candidates |
            Where-Object { -not [string]::IsNullOrWhiteSpace($_) -and (Test-Path -LiteralPath $_) } |
            Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($pythonExecutable)) {
            throw "python is required on the self-hosted deployment runner."
          }
          & $pythonExecutable --version
          if ($LASTEXITCODE -ne 0) {
            throw "Resolved python executable is not runnable: $pythonExecutable"
          }
          "PYTHON_EXECUTABLE=$pythonExecutable" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Resolve deployment metadata
        id: meta
        shell: pwsh
        run: |
          $ownerLc = "${{ github.repository_owner }}".ToLowerInvariant()
          if ("${{ github.event_name }}" -eq "push") {
            $releaseTag = "${{ github.ref_name }}"
            $runtimeRoot = if ([string]::IsNullOrWhiteSpace("${{ vars.EASYPROXY_SERVICE_DEPLOY_ROOT }}")) { "C:\Users\Public\nas_home\AI\GameEditor\EasyProxy\deploy\service\base" } else { "${{ vars.EASYPROXY_SERVICE_DEPLOY_ROOT }}" }
            $networkName = if ([string]::IsNullOrWhiteSpace("${{ vars.EASYPROXY_SERVICE_DEPLOY_NETWORK }}")) { "EasyAiMi" } else { "${{ vars.EASYPROXY_SERVICE_DEPLOY_NETWORK }}" }
            $waitMinutes = if ([string]::IsNullOrWhiteSpace("${{ vars.EASYPROXY_SERVICE_DEPLOY_WAIT_MINUTES }}")) { "35" } else { "${{ vars.EASYPROXY_SERVICE_DEPLOY_WAIT_MINUTES }}" }
          }
          else {
            $releaseTag = "${{ inputs.release_tag }}"
            $runtimeRoot = if ([string]::IsNullOrWhiteSpace("${{ inputs.runtime_root }}")) {
              if ([string]::IsNullOrWhiteSpace("${{ vars.EASYPROXY_SERVICE_DEPLOY_ROOT }}")) { "C:\Users\Public\nas_home\AI\GameEditor\EasyProxy\deploy\service\base" } else { "${{ vars.EASYPROXY_SERVICE_DEPLOY_ROOT }}" }
            } else {
              "${{ inputs.runtime_root }}"
            }
            $networkName = if ([string]::IsNullOrWhiteSpace("${{ inputs.network_name }}")) {
              if ([string]::IsNullOrWhiteSpace("${{ vars.EASYPROXY_SERVICE_DEPLOY_NETWORK }}")) { "EasyAiMi" } else { "${{ vars.EASYPROXY_SERVICE_DEPLOY_NETWORK }}" }
            } else {
              "${{ inputs.network_name }}"
            }
            $waitMinutes = if ([string]::IsNullOrWhiteSpace("${{ inputs.wait_minutes }}")) { "35" } else { "${{ inputs.wait_minutes }}" }
          }

          if ([string]::IsNullOrWhiteSpace($releaseTag)) {
            throw "release_tag is required."
          }

          $serviceImage = "ghcr.io/$ownerLc/easy-proxy-monorepo-service:$releaseTag"
          "owner_lc=$ownerLc" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "release_tag=$releaseTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "runtime_root=$runtimeRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "network_name=$networkName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "wait_minutes=$waitMinutes" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "service_image=$serviceImage" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Assert runtime config secret
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:EASYPROXY_ROOT_CONFIG_YAML_B64)) {
            throw "EASYPROXY_ROOT_CONFIG_YAML_B64 is required for runtime deployment."
          }

      - name: Materialize root config
        shell: pwsh
        run: |
          $rootConfigPath = Join-Path $env:RUNNER_TEMP "easyproxy-runtime-root-config.yaml"
          [System.IO.File]::WriteAllText($rootConfigPath, [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($env:EASYPROXY_ROOT_CONFIG_YAML_B64)))
          "EASYPROXY_RUNTIME_ROOT_CONFIG_PATH=$rootConfigPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Render service/base runtime config
        shell: pwsh
        run: |
          $renderedConfigPath = Join-Path $env:RUNNER_TEMP "easyproxy-runtime-rendered-config.yaml"
          .\scripts\render-derived-configs.ps1 `
            -ConfigPath $env:EASYPROXY_RUNTIME_ROOT_CONFIG_PATH `
            -ServiceBase `
            -ServiceOutput $renderedConfigPath
          if (-not (Test-Path -LiteralPath $renderedConfigPath)) {
            throw "Rendered service config not found: $renderedConfigPath"
          }
          "EASYPROXY_RUNTIME_RENDERED_CONFIG_PATH=$renderedConfigPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Extract management password
        shell: pwsh
        run: |
          $password = & $env:PYTHON_EXECUTABLE -c "import sys, yaml; data=yaml.safe_load(open(sys.argv[1], 'r', encoding='utf-8').read()) or {}; print(((data.get('management') or {}).get('password') or '').strip())" $env:EASYPROXY_RUNTIME_RENDERED_CONFIG_PATH
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to extract management password from rendered config"
          }
          "EASYPROXY_RUNTIME_MANAGEMENT_PASSWORD=$password" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Log in to GHCR
        shell: pwsh
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GHCR_TOKEN)) {
            throw "GITHUB_TOKEN is required for GHCR login."
          }
          $env:GHCR_TOKEN | docker login ghcr.io -u $env:GHCR_USERNAME --password-stdin
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to login to GHCR"
          }

      - name: Wait for published image to become pullable
        shell: pwsh
        run: |
          $image = "${{ steps.meta.outputs.service_image }}"
          $waitMinutes = [double]"${{ steps.meta.outputs.wait_minutes }}"
          $deadline = (Get-Date).AddMinutes($waitMinutes)
          $pulled = $false
          while ((Get-Date) -lt $deadline) {
            Write-Host "Attempting to pull $image ..." -ForegroundColor Cyan
            & docker pull $image
            if ($LASTEXITCODE -eq 0) {
              $pulled = $true
              break
            }
            Start-Sleep -Seconds 15
          }
          if (-not $pulled) {
            throw "Timed out waiting for GHCR image: $image"
          }

      - name: Deploy runtime container
        shell: pwsh
        run: |
          .\deploy\service\base\scripts\deploy-ghcr-runtime.ps1 `
            -ConfigPath $env:EASYPROXY_RUNTIME_RENDERED_CONFIG_PATH `
            -Image "${{ steps.meta.outputs.service_image }}" `
            -RuntimeRoot "${{ steps.meta.outputs.runtime_root }}" `
            -NetworkName "${{ steps.meta.outputs.network_name }}" `
            -SkipPull

      - name: Verify deployed image and management APIs
        shell: pwsh
        run: |
          $expectedImage = "${{ steps.meta.outputs.service_image }}"
          $actualImage = (& docker inspect --format '{{.Config.Image}}' easy-proxy-monorepo-service 2>$null | Out-String).Trim()
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to inspect deployed container image"
          }
          if ($actualImage -ne $expectedImage) {
            throw "Container image mismatch. Expected $expectedImage but found $actualImage"
          }

          $headers = @{}
          if (-not [string]::IsNullOrWhiteSpace($env:EASYPROXY_RUNTIME_MANAGEMENT_PASSWORD)) {
            $headers["Authorization"] = $env:EASYPROXY_RUNTIME_MANAGEMENT_PASSWORD
          }

          $deadline = (Get-Date).AddMinutes(5)
          $sourceSync = $null
          while ((Get-Date) -lt $deadline) {
            try {
              $sourceSync = Invoke-RestMethod -Uri 'http://127.0.0.1:29888/api/source-sync/status' -Headers $headers -TimeoutSec 20
              break
            }
            catch {
              Start-Sleep -Seconds 10
            }
          }
          if ($null -eq $sourceSync) {
            throw "Management API did not become ready in time"
          }

          $sourceHealth = Invoke-RestMethod -Uri 'http://127.0.0.1:29888/api/source-sync/source-health?source_ref=manifest:conn_zenproxy_primary' -Headers $headers -TimeoutSec 20
          if ($null -eq $sourceHealth.sources -or $sourceHealth.sources.Count -lt 1) {
            throw "ZenProxy source health response did not include manifest:conn_zenproxy_primary"
          }

          & curl.exe -I -x "http://127.0.0.1:22323" "https://www.google.com/generate_204" --max-time 25 -k
          if ($LASTEXITCODE -ne 0) {
            throw "Proxy listener failed generate_204 validation"
          }

      - name: Deployment summary
        shell: pwsh
        run: |
          @"
          ## Service/base runtime deployed

          - release tag: `${{ steps.meta.outputs.release_tag }}`
          - image: `${{ steps.meta.outputs.service_image }}`
          - runtime root: `${{ steps.meta.outputs.runtime_root }}`
          - docker network: `${{ steps.meta.outputs.network_name }}`
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

name: Dispatch Aggregator Workflow

'on':
  workflow_dispatch:
    inputs:
      aggregator_repo:
        description: Target aggregator repository in owner/repo form
        required: false
        default: aiaimimi0920/aggregator
        type: string
      workflow:
        description: Target workflow file in the aggregator repository
        required: false
        default: process-r2.yaml
        type: string
      ref:
        description: Target ref in the aggregator repository
        required: false
        default: main
        type: string
      secret_name:
        description: Secret name to update in the aggregator repository
        required: false
        default: SUBSCRIBE_CONF_JSON_B64
        type: string
      config_path:
        description: Local source config to base64-encode and publish
        required: false
        default: deploy/upstreams/aggregator/config/config.actions.r2.json
        type: string

permissions:
  contents: read

jobs:
  preflight:
    name: Aggregator dispatch preflight
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: service/base/go.mod
          cache-dependency-path: service/base/go.sum

      - name: Install Python test dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install PyYAML tqdm

      - name: Run root script smoke tests
        shell: pwsh
        run: |
          python -m unittest discover -s "tests" -p "test_*.py" -v

      - name: Run aggregator regression tests
        shell: pwsh
        run: |
          python -m unittest discover -s "upstreams/aggregator/tests" -p "test_*.py" -v

      - name: Run service/base monitor tests
        shell: pwsh
        working-directory: service/base
        run: |
          go test ./internal/monitor

      - name: Run service/base boxmgr tests
        shell: pwsh
        working-directory: service/base
        run: |
          go test ./internal/boxmgr

      - name: Run service/base config tests
        shell: pwsh
        working-directory: service/base
        run: |
          go test ./internal/config

  dispatch:
    name: Update aggregator secret and dispatch workflow
    runs-on: ubuntu-latest
    needs: preflight

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install aggregator dispatch dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pynacl

      - name: Assert aggregator dispatch secret
        shell: bash
        env:
          AGGREGATOR_REPO_TOKEN: ${{ secrets.AGGREGATOR_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${AGGREGATOR_REPO_TOKEN:-}" ]]; then
            echo "::error::AGGREGATOR_REPO_TOKEN is required to update an external repository secret and dispatch its workflow."
            exit 1
          fi

      - name: Dispatch aggregator workflow
        env:
          AGGREGATOR_REPO_TOKEN: ${{ secrets.AGGREGATOR_REPO_TOKEN }}
          AGGREGATOR_REPO: ${{ inputs.aggregator_repo }}
          AGGREGATOR_WORKFLOW: ${{ inputs.workflow }}
          AGGREGATOR_REF: ${{ inputs.ref }}
          AGGREGATOR_SECRET_NAME: ${{ inputs.secret_name }}
          AGGREGATOR_CONFIG_PATH: ${{ inputs.config_path }}
        run: |
          python scripts/github/dispatch_aggregator.py

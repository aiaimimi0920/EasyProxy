name: Publish GitHub Release

on:
  push:
    tags:
      - "release-*"
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to create or update
        required: true
        type: string
      draft:
        description: Create or update the release as a draft
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            tag="${GITHUB_REF_NAME}"
            draft="false"
          else
            tag="${{ inputs.release_tag }}"
            draft="${{ inputs.draft }}"
          fi
          echo "owner_lc=${owner_lc}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "draft=${draft}" >> "$GITHUB_OUTPUT"

      - name: Render release notes
        run: |
          python scripts/render-github-release.py \
            --tag "${{ steps.release_meta.outputs.tag }}" \
            --owner "${{ steps.release_meta.outputs.owner_lc }}" \
            --output github-release-notes.md

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release_meta.outputs.tag }}"
          draft="${{ steps.release_meta.outputs.draft }}"

          if gh release view "${tag}" >/dev/null 2>&1; then
            args=(gh release edit "${tag}" --title "${tag}" --notes-file github-release-notes.md)
            if [[ "${draft}" == "true" ]]; then
              args+=(--draft)
            fi
            "${args[@]}"
          else
            args=(gh release create "${tag}" --target "${GITHUB_SHA}" --title "${tag}" --notes-file github-release-notes.md)
            if [[ "${draft}" == "true" ]]; then
              args+=(--draft)
            fi
            "${args[@]}"
          fi

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-release-notes
          path: github-release-notes.md

      - name: Job summary
        shell: bash
        run: |
          cat github-release-notes.md >> "$GITHUB_STEP_SUMMARY"

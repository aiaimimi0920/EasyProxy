name: Publish GHCR Images

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

'on':
  push:
    tags:
      - 'release-*'
      - 'v*'
  workflow_dispatch:
    inputs:
      target:
        description: Which image set to publish
        required: true
        default: both
        type: choice
        options:
          - both
          - easyproxy
          - ech-workers
      release_tag:
        description: Optional image tag override for manual runs
        required: false
        type: string
      platforms:
        description: Target build platforms
        required: false
        default: linux/amd64
        type: choice
        options:
          - linux/amd64
          - linux/amd64,linux/arm64

permissions:
  contents: read
  packages: write

jobs:
  preflight:
    name: Release preflight validation
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: service/base/go.mod
          cache-dependency-path: service/base/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: upstreams/misub/package-lock.json

      - name: Install Python test dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install PyYAML tqdm requests

      - name: Run root script smoke tests
        shell: pwsh
        run: |
          python -m unittest discover -s "tests" -p "test_*.py" -v

      - name: Run aggregator regression tests
        shell: pwsh
        run: |
          python -m unittest discover -s "upstreams/aggregator/tests" -p "test_*.py" -v

      - name: Install MiSub test dependencies
        shell: pwsh
        working-directory: upstreams/misub
        run: |
          npm ci

      - name: Run MiSub unit tests
        shell: pwsh
        working-directory: upstreams/misub
        run: |
          npm run test:run

      - name: Run service/base monitor tests
        shell: pwsh
        working-directory: service/base
        run: |
          go test ./internal/monitor

      - name: Run service/base boxmgr tests
        shell: pwsh
        working-directory: service/base
        run: |
          go test ./internal/boxmgr

      - name: Run service/base config tests
        shell: pwsh
        working-directory: service/base
        run: |
          go test ./internal/config

      - name: Run service/base subscription tests
        shell: pwsh
        working-directory: service/base
        run: |
          go test ./internal/subscription

  publish:
    name: Build and publish GHCR images
    runs-on: ubuntu-latest
    needs: preflight
    outputs:
      owner_lc: ${{ steps.prep.outputs.owner_lc }}
      target: ${{ steps.prep.outputs.target }}
      release_tag: ${{ steps.prep.outputs.release_tag }}
      platforms: ${{ steps.prep.outputs.platforms }}
    concurrency:
      group: ghcr-publish-${{ github.event_name }}-${{ github.ref_name }}-${{ github.event_name == 'workflow_dispatch' && inputs.target || 'both' }}
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve publish inputs
        id: prep
        shell: bash
        run: |
          set -euo pipefail

          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            target="both"
            release_tag="${GITHUB_REF_NAME}"
            platforms="linux/amd64"
          else
            target="${{ inputs.target }}"
            release_tag="${{ inputs.release_tag }}"
            platforms="${{ inputs.platforms }}"
            if [[ -z "${release_tag}" ]]; then
              release_tag="release-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"
            fi
          fi

          echo "owner_lc=${owner_lc}" >> "$GITHUB_OUTPUT"
          echo "target=${target}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "platforms=${platforms}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install distribution dependencies
        if: steps.prep.outputs.target == 'both' || steps.prep.outputs.target == 'easyproxy'
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install boto3 PyYAML pynacl

      - name: Extract metadata for EasyProxy service image
        if: steps.prep.outputs.target == 'both' || steps.prep.outputs.target == 'easyproxy'
        id: meta_service
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ steps.prep.outputs.owner_lc }}/easy-proxy-monorepo-service
          tags: |
            type=raw,value=${{ steps.prep.outputs.release_tag }}

      - name: Build and push EasyProxy service image
        if: steps.prep.outputs.target == 'both' || steps.prep.outputs.target == 'easyproxy'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/service/base/Dockerfile
          platforms: ${{ steps.prep.outputs.platforms }}
          push: true
          tags: ${{ steps.meta_service.outputs.tags }}
          labels: ${{ steps.meta_service.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pull EasyProxy service image for smoke
        if: steps.prep.outputs.target == 'both' || steps.prep.outputs.target == 'easyproxy'
        shell: bash
        run: |
          set -euo pipefail
          docker pull "ghcr.io/${{ steps.prep.outputs.owner_lc }}/easy-proxy-monorepo-service:${{ steps.prep.outputs.release_tag }}"

      - name: Smoke EasyProxy service image
        if: steps.prep.outputs.target == 'both' || steps.prep.outputs.target == 'easyproxy'
        shell: pwsh
        run: |
          .\deploy\service\base\scripts\smoke-easy-proxy-docker-api.ps1 `
            -Image "ghcr.io/${{ steps.prep.outputs.owner_lc }}/easy-proxy-monorepo-service:${{ steps.prep.outputs.release_tag }}"

      - name: Resolve service/base distribution secrets
        if: steps.prep.outputs.target == 'both' || steps.prep.outputs.target == 'easyproxy'
        id: service_base_distribution
        env:
          EASYPROXY_ROOT_CONFIG_YAML_B64: ${{ secrets.EASYPROXY_ROOT_CONFIG_YAML_B64 }}
          EASYPROXY_R2_CONFIG_ACCOUNT_ID: ${{ secrets.EASYPROXY_R2_CONFIG_ACCOUNT_ID }}
          EASYPROXY_R2_CONFIG_BUCKET: ${{ secrets.EASYPROXY_R2_CONFIG_BUCKET }}
          EASYPROXY_R2_CONFIG_ENDPOINT: ${{ secrets.EASYPROXY_R2_CONFIG_ENDPOINT }}
          EASYPROXY_R2_CONFIG_CONFIG_OBJECT_KEY: ${{ secrets.EASYPROXY_R2_CONFIG_CONFIG_OBJECT_KEY }}
          EASYPROXY_R2_CONFIG_MANIFEST_OBJECT_KEY: ${{ secrets.EASYPROXY_R2_CONFIG_MANIFEST_OBJECT_KEY }}
          EASYPROXY_R2_CONFIG_UPLOAD_ACCESS_KEY_ID: ${{ secrets.EASYPROXY_R2_CONFIG_UPLOAD_ACCESS_KEY_ID }}
          EASYPROXY_R2_CONFIG_UPLOAD_SECRET_ACCESS_KEY: ${{ secrets.EASYPROXY_R2_CONFIG_UPLOAD_SECRET_ACCESS_KEY }}
          EASYPROXY_R2_CONFIG_READ_ACCESS_KEY_ID: ${{ secrets.EASYPROXY_R2_CONFIG_READ_ACCESS_KEY_ID }}
          EASYPROXY_R2_CONFIG_READ_SECRET_ACCESS_KEY: ${{ secrets.EASYPROXY_R2_CONFIG_READ_SECRET_ACCESS_KEY }}
          EASYPROXY_IMPORT_CODE_OWNER_PUBLIC_KEY: ${{ secrets.EASYPROXY_IMPORT_CODE_OWNER_PUBLIC_KEY }}
        shell: pwsh
        run: |
          $distributionEnabled = $true
          foreach ($name in @(
            'EASYPROXY_ROOT_CONFIG_YAML_B64',
            'EASYPROXY_R2_CONFIG_ACCOUNT_ID',
            'EASYPROXY_R2_CONFIG_BUCKET',
            'EASYPROXY_R2_CONFIG_CONFIG_OBJECT_KEY',
            'EASYPROXY_R2_CONFIG_MANIFEST_OBJECT_KEY',
            'EASYPROXY_R2_CONFIG_UPLOAD_ACCESS_KEY_ID',
            'EASYPROXY_R2_CONFIG_UPLOAD_SECRET_ACCESS_KEY'
          )) {
            if ([string]::IsNullOrWhiteSpace((Get-Item -Path "Env:$name" -ErrorAction SilentlyContinue).Value)) {
              $distributionEnabled = $false
              break
            }
          }

          $importEnabled = $distributionEnabled
          foreach ($name in @(
            'EASYPROXY_R2_CONFIG_READ_ACCESS_KEY_ID',
            'EASYPROXY_R2_CONFIG_READ_SECRET_ACCESS_KEY',
            'EASYPROXY_IMPORT_CODE_OWNER_PUBLIC_KEY'
          )) {
            if ([string]::IsNullOrWhiteSpace((Get-Item -Path "Env:$name" -ErrorAction SilentlyContinue).Value)) {
              $importEnabled = $false
              break
            }
          }

          "distribution_enabled=$($distributionEnabled.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "import_enabled=$($importEnabled.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Materialize service/base root config
        if: steps.service_base_distribution.outputs.distribution_enabled == 'true'
        shell: bash
        env:
          EASYPROXY_ROOT_CONFIG_YAML_B64: ${{ secrets.EASYPROXY_ROOT_CONFIG_YAML_B64 }}
        run: |
          set -euo pipefail
          printf '%s' "${EASYPROXY_ROOT_CONFIG_YAML_B64}" | base64 -d > config.yaml

      - name: Upload service/base runtime config distribution
        if: steps.service_base_distribution.outputs.distribution_enabled == 'true'
        id: runtime_config_upload
        shell: pwsh
        env:
          EASYPROXY_R2_CONFIG_ACCOUNT_ID: ${{ secrets.EASYPROXY_R2_CONFIG_ACCOUNT_ID }}
          EASYPROXY_R2_CONFIG_BUCKET: ${{ secrets.EASYPROXY_R2_CONFIG_BUCKET }}
          EASYPROXY_R2_CONFIG_ENDPOINT: ${{ secrets.EASYPROXY_R2_CONFIG_ENDPOINT }}
          EASYPROXY_R2_CONFIG_CONFIG_OBJECT_KEY: ${{ secrets.EASYPROXY_R2_CONFIG_CONFIG_OBJECT_KEY }}
          EASYPROXY_R2_CONFIG_MANIFEST_OBJECT_KEY: ${{ secrets.EASYPROXY_R2_CONFIG_MANIFEST_OBJECT_KEY }}
          EASYPROXY_R2_CONFIG_UPLOAD_ACCESS_KEY_ID: ${{ secrets.EASYPROXY_R2_CONFIG_UPLOAD_ACCESS_KEY_ID }}
          EASYPROXY_R2_CONFIG_UPLOAD_SECRET_ACCESS_KEY: ${{ secrets.EASYPROXY_R2_CONFIG_UPLOAD_SECRET_ACCESS_KEY }}
        run: |
          $manifestPath = Join-Path $PWD 'service-base-r2-config-manifest.json'
          .\scripts\upload-service-base-r2-config.ps1 `
            -ConfigPath .\config.yaml `
            -AccountId $env:EASYPROXY_R2_CONFIG_ACCOUNT_ID `
            -Bucket $env:EASYPROXY_R2_CONFIG_BUCKET `
            -AccessKeyId $env:EASYPROXY_R2_CONFIG_UPLOAD_ACCESS_KEY_ID `
            -SecretAccessKey $env:EASYPROXY_R2_CONFIG_UPLOAD_SECRET_ACCESS_KEY `
            -ConfigObjectKey $env:EASYPROXY_R2_CONFIG_CONFIG_OBJECT_KEY `
            -ManifestObjectKey $env:EASYPROXY_R2_CONFIG_MANIFEST_OBJECT_KEY `
            -Endpoint $env:EASYPROXY_R2_CONFIG_ENDPOINT `
            -ReleaseVersion '${{ steps.prep.outputs.release_tag }}' `
            -ManifestOutput $manifestPath
          "path=$manifestPath" >> $env:GITHUB_OUTPUT

      - name: Generate encrypted import code
        if: steps.service_base_distribution.outputs.import_enabled == 'true'
        id: import_code
        shell: bash
        env:
          EASYPROXY_R2_CONFIG_ACCOUNT_ID: ${{ secrets.EASYPROXY_R2_CONFIG_ACCOUNT_ID }}
          EASYPROXY_R2_CONFIG_BUCKET: ${{ secrets.EASYPROXY_R2_CONFIG_BUCKET }}
          EASYPROXY_R2_CONFIG_ENDPOINT: ${{ secrets.EASYPROXY_R2_CONFIG_ENDPOINT }}
          EASYPROXY_R2_CONFIG_MANIFEST_OBJECT_KEY: ${{ secrets.EASYPROXY_R2_CONFIG_MANIFEST_OBJECT_KEY }}
          EASYPROXY_R2_CONFIG_READ_ACCESS_KEY_ID: ${{ secrets.EASYPROXY_R2_CONFIG_READ_ACCESS_KEY_ID }}
          EASYPROXY_R2_CONFIG_READ_SECRET_ACCESS_KEY: ${{ secrets.EASYPROXY_R2_CONFIG_READ_SECRET_ACCESS_KEY }}
          EASYPROXY_IMPORT_CODE_OWNER_PUBLIC_KEY: ${{ secrets.EASYPROXY_IMPORT_CODE_OWNER_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          python scripts/easyproxy-import-code.py encode \
            --account-id "${EASYPROXY_R2_CONFIG_ACCOUNT_ID}" \
            --bucket "${EASYPROXY_R2_CONFIG_BUCKET}" \
            --manifest-object-key "${EASYPROXY_R2_CONFIG_MANIFEST_OBJECT_KEY}" \
            --access-key-id "${EASYPROXY_R2_CONFIG_READ_ACCESS_KEY_ID}" \
            --secret-access-key "${EASYPROXY_R2_CONFIG_READ_SECRET_ACCESS_KEY}" \
            --endpoint "${EASYPROXY_R2_CONFIG_ENDPOINT}" \
            --release-version "${{ steps.prep.outputs.release_tag }}" \
            --json-output \
            --output service-base-import-code.bundle.json

          python scripts/easyproxy-import-code.py encrypt \
            --bundle-file service-base-import-code.bundle.json \
            --public-key "${EASYPROXY_IMPORT_CODE_OWNER_PUBLIC_KEY}" \
            --metadata-json "{\"releaseVersion\":\"${{ steps.prep.outputs.release_tag }}\",\"manifestObjectKey\":\"${EASYPROXY_R2_CONFIG_MANIFEST_OBJECT_KEY}\"}" \
            --output service-base-import-code.encrypted.json

          echo "encrypted_path=service-base-import-code.encrypted.json" >> "${GITHUB_OUTPUT}"

      - name: Upload service/base config distribution manifest
        if: steps.service_base_distribution.outputs.distribution_enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: service-base-r2-config-manifest
          path: ${{ steps.runtime_config_upload.outputs.path }}

      - name: Upload encrypted import code
        if: steps.service_base_distribution.outputs.import_enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: service-base-import-code-encrypted
          path: ${{ steps.import_code.outputs.encrypted_path }}

      - name: Extract metadata for ech-workers image
        if: steps.prep.outputs.target == 'both' || steps.prep.outputs.target == 'ech-workers'
        id: meta_worker
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ steps.prep.outputs.owner_lc }}/ech-workers-monorepo
          tags: |
            type=raw,value=${{ steps.prep.outputs.release_tag }}

      - name: Build and push ech-workers image
        if: steps.prep.outputs.target == 'both' || steps.prep.outputs.target == 'ech-workers'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/upstreams/ech-workers/Dockerfile
          platforms: ${{ steps.prep.outputs.platforms }}
          push: true
          tags: ${{ steps.meta_worker.outputs.tags }}
          labels: ${{ steps.meta_worker.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pull ech-workers image for smoke
        if: steps.prep.outputs.target == 'both' || steps.prep.outputs.target == 'ech-workers'
        shell: bash
        run: |
          set -euo pipefail
          docker pull "ghcr.io/${{ steps.prep.outputs.owner_lc }}/ech-workers-monorepo:${{ steps.prep.outputs.release_tag }}"

      - name: Smoke ech-workers image
        if: steps.prep.outputs.target == 'both' || steps.prep.outputs.target == 'ech-workers'
        shell: pwsh
        run: |
          .\deploy\upstreams\ech-workers\scripts\smoke-ech-workers-docker.ps1 `
            -Image "ghcr.io/${{ steps.prep.outputs.owner_lc }}/ech-workers-monorepo:${{ steps.prep.outputs.release_tag }}"

      - name: Job summary
        shell: bash
        run: |
          {
            echo "## GHCR publish completed"
            echo
            echo "- target: \`${{ steps.prep.outputs.target }}\`"
            echo "- release tag: \`${{ steps.prep.outputs.release_tag }}\`"
            echo "- platforms: \`${{ steps.prep.outputs.platforms }}\`"
            if [[ "${{ steps.prep.outputs.target }}" == "both" || "${{ steps.prep.outputs.target }}" == "easyproxy" ]]; then
              echo "- service image: \`ghcr.io/${{ steps.prep.outputs.owner_lc }}/easy-proxy-monorepo-service:${{ steps.prep.outputs.release_tag }}\`"
              if [[ "${{ steps.service_base_distribution.outputs.distribution_enabled }}" == "true" ]]; then
                echo "- service/base manifest: \`${{ secrets.EASYPROXY_R2_CONFIG_MANIFEST_OBJECT_KEY }}\`"
              fi
              if [[ "${{ steps.service_base_distribution.outputs.import_enabled }}" == "true" ]]; then
                echo "- import code artifact: \`service-base-import-code-encrypted\`"
              fi
            fi
            if [[ "${{ steps.prep.outputs.target }}" == "both" || "${{ steps.prep.outputs.target }}" == "ech-workers" ]]; then
              echo "- worker image: \`ghcr.io/${{ steps.prep.outputs.owner_lc }}/ech-workers-monorepo:${{ steps.prep.outputs.release_tag }}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  runtime-e2e:
    name: End-to-end EasyProxy runtime validation
    runs-on: ubuntu-latest
    needs: publish
    if: ${{ needs.publish.result == 'success' && (needs.publish.outputs.target == 'both' || needs.publish.outputs.target == 'easyproxy') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Materialize runtime config for validation
        shell: pwsh
        env:
          EASYPROXY_ROOT_CONFIG_YAML_B64: ${{ secrets.EASYPROXY_ROOT_CONFIG_YAML_B64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:EASYPROXY_ROOT_CONFIG_YAML_B64)) {
            throw "EASYPROXY_ROOT_CONFIG_YAML_B64 is required for runtime validation."
          }
          $configPath = Join-Path $env:RUNNER_TEMP "easyproxy-runtime-config.yaml"
          [System.IO.File]::WriteAllText($configPath, [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($env:EASYPROXY_ROOT_CONFIG_YAML_B64)))
          "EASYPROXY_RUNTIME_CONFIG_PATH=$configPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install PowerShell validation dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install PyYAML requests

      - name: Run end-to-end EasyProxy runtime validation
        shell: pwsh
        run: |
          .\deploy\service\base\scripts\validate-easy-proxy-runtime.ps1 `
            -ConfigPath $env:EASYPROXY_RUNTIME_CONFIG_PATH `
            -Image "ghcr.io/${{ needs.publish.outputs.owner_lc }}/easy-proxy-monorepo-service:${{ needs.publish.outputs.release_tag }}" `
            -KeepArtifacts

      - name: Upload runtime validation artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: easyproxy-runtime-validation-${{ needs.publish.outputs.release_tag }}
          path: tmp/easy-proxy-runtime-validation
          if-no-files-found: ignore

      - name: Runtime validation summary
        shell: bash
        run: |
          {
            echo "## End-to-end EasyProxy runtime validation completed"
            echo
            echo "- validated image: \`ghcr.io/${{ needs.publish.outputs.owner_lc }}/easy-proxy-monorepo-service:${{ needs.publish.outputs.release_tag }}\`"
            echo "- config source: \`EASYPROXY_ROOT_CONFIG_YAML_B64\`"
            echo "- scenarios: \`local-subscription, local-direct-proxy, manifest-subscription, fallback-subscription, local-connector, manifest-connector\`"
          } >> "$GITHUB_STEP_SUMMARY"

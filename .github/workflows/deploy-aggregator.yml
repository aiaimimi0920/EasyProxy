name: Deploy Aggregator

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

'on':
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      deployment_mode:
        description: Native deployment mode
        required: true
        default: update
        type: choice
        options:
          - bootstrap
          - update
      run_verification:
        description: Verify public artifacts after publish
        required: false
        default: true
        type: boolean
      force_deploy:
        description: Run even if no recent repository changes are present
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  preflight:
    name: Aggregator native preflight
    if: ${{ github.event_name != 'schedule' || vars.EASYPROXY_AGGREGATOR_ENABLE_SCHEDULE == 'true' }}
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: service/base/go.mod
          cache-dependency-path: service/base/go.sum

      - name: Install Python test dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install PyYAML tqdm requests

      - name: Run root script smoke tests
        shell: pwsh
        run: |
          python -m unittest discover -s "tests" -p "test_*.py" -v

      - name: Run aggregator regression tests
        shell: pwsh
        run: |
          python -m unittest discover -s "upstreams/aggregator/tests" -p "test_*.py" -v

      - name: Run service/base monitor tests
        shell: pwsh
        working-directory: service/base
        run: |
          go test ./internal/monitor

      - name: Run service/base boxmgr tests
        shell: pwsh
        working-directory: service/base
        run: |
          go test ./internal/boxmgr

      - name: Run service/base config tests
        shell: pwsh
        working-directory: service/base
        run: |
          go test ./internal/config

  deploy:
    name: Run native aggregator publish
    if: ${{ github.event_name != 'schedule' || vars.EASYPROXY_AGGREGATOR_ENABLE_SCHEDULE == 'true' }}
    runs-on: ubuntu-latest
    needs: preflight
    timeout-minutes: 180
    env:
      TZ: Asia/Shanghai
      GH_TOKEN: ${{ secrets.EASYPROXY_AGGREGATOR_GH_TOKEN }}
      R2_ACCESS_KEY_ID: ${{ secrets.EASYPROXY_AGGREGATOR_R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.EASYPROXY_AGGREGATOR_R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.EASYPROXY_AGGREGATOR_R2_ACCOUNT_ID }}
      SKIP_ALIVE_CHECK: ${{ vars.EASYPROXY_AGGREGATOR_SKIP_ALIVE_CHECK }}
      SKIP_REMARK: ${{ vars.EASYPROXY_AGGREGATOR_SKIP_REMARK }}
      REACHABLE: ${{ vars.EASYPROXY_AGGREGATOR_REACHABLE }}
      ENABLE_SPECIAL_PROTOCOLS: ${{ vars.EASYPROXY_AGGREGATOR_ENABLE_SPECIAL_PROTOCOLS }}
      LOG_LEVEL_DEBUG: ${{ vars.EASYPROXY_AGGREGATOR_LOG_LEVEL_DEBUG }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install aggregator dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r upstreams/aggregator/requirements.txt requests boto3 PyYAML

      - name: Resolve deployment mode
        id: deploy_mode
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            mode="${{ inputs.deployment_mode }}"
            run_verification="${{ inputs.run_verification }}"
            force_deploy="${{ inputs.force_deploy }}"
          else
            mode="update"
            run_verification="true"
            force_deploy="false"
          fi
          echo "mode=${mode}" >> "${GITHUB_OUTPUT}"
          echo "run_verification=${run_verification}" >> "${GITHUB_OUTPUT}"
          echo "force_deploy=${force_deploy}" >> "${GITHUB_OUTPUT}"

      - name: Detect relevant changes
        id: change_gate
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" || "${GITHUB_EVENT_NAME}" == "schedule" || "${{ steps.deploy_mode.outputs.force_deploy }}" == "true" ]]; then
            {
              echo "should_deploy=true"
              echo "reason=manual_schedule_or_forced"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          mapfile -t matched_files < <(
            git diff-tree --no-commit-id --name-only -r "${GITHUB_SHA}" -- \
              upstreams/aggregator \
              deploy/upstreams/aggregator \
              scripts/deploy-aggregator.ps1 \
              scripts/materialize-aggregator-config.py \
              scripts/verify-aggregator-publish.py \
              .github/workflows/deploy-aggregator.yml
          )

          if [[ "${#matched_files[@]}" -eq 0 ]]; then
            {
              echo "should_deploy=false"
              echo "reason=no_relevant_changes"
              echo "matched_files<<EOF"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          {
            echo "should_deploy=true"
            echo "reason=relevant_changes_detected"
            echo "matched_files<<EOF"
            printf '%s\n' "${matched_files[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Skip deployment summary
        if: steps.change_gate.outputs.should_deploy != 'true'
        shell: bash
        run: |
          {
            echo "## Aggregator deploy"
            echo
            echo "- Result: skipped"
            echo "- Reason: \`${{ steps.change_gate.outputs.reason }}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Validate native aggregator secrets
        if: steps.change_gate.outputs.should_deploy == 'true'
        shell: bash
        run: |
          set -euo pipefail
          for name in GH_TOKEN R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY R2_ACCOUNT_ID; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::${name} is required for native aggregator deployment."
              exit 1
            fi
          done

      - name: Materialize runtime config
        if: steps.change_gate.outputs.should_deploy == 'true'
        shell: bash
        env:
          EASYPROXY_AGGREGATOR_SEED_SUB_KEY: ${{ secrets.EASYPROXY_AGGREGATOR_SEED_SUB_KEY }}
          EASYPROXY_AGGREGATOR_SHARED_TOKEN: ${{ secrets.EASYPROXY_AGGREGATOR_SHARED_TOKEN }}
        run: |
          set -euo pipefail
          python scripts/materialize-aggregator-config.py \
            --template deploy/upstreams/aggregator/config/config.actions.r2.json \
            --output upstreams/aggregator/subscribe/config/config.actions.runtime.json

      - name: Run aggregator publish
        if: steps.change_gate.outputs.should_deploy == 'true'
        working-directory: upstreams/aggregator
        shell: bash
        run: |
          set -euo pipefail
          python -u subscribe/process.py --overwrite -s subscribe/config/config.actions.runtime.json

      - name: Verify published artifacts
        if: steps.change_gate.outputs.should_deploy == 'true' && steps.deploy_mode.outputs.run_verification == 'true'
        shell: bash
        env:
          EASYPROXY_AGGREGATOR_PUBLIC_BASE_URL: ${{ vars.EASYPROXY_AGGREGATOR_PUBLIC_BASE_URL }}
        run: |
          set -euo pipefail
          if [[ -z "${EASYPROXY_AGGREGATOR_PUBLIC_BASE_URL:-}" ]]; then
            echo "::error::EASYPROXY_AGGREGATOR_PUBLIC_BASE_URL must be set when run_verification=true."
            exit 1
          fi
          python scripts/verify-aggregator-publish.py \
            --base-url "${EASYPROXY_AGGREGATOR_PUBLIC_BASE_URL}" \
            --runtime-config upstreams/aggregator/subscribe/config/config.actions.runtime.json

      - name: Audit shared effective aggregator nodes
        if: steps.change_gate.outputs.should_deploy == 'true'
        shell: pwsh
        env:
          EASYPROXY_AGGREGATOR_PUBLIC_BASE_URL: ${{ vars.EASYPROXY_AGGREGATOR_PUBLIC_BASE_URL }}
        run: |
          $baseUrl = $env:EASYPROXY_AGGREGATOR_PUBLIC_BASE_URL
          if ([string]::IsNullOrWhiteSpace($baseUrl)) {
            throw "EASYPROXY_AGGREGATOR_PUBLIC_BASE_URL is required for aggregator effective audit."
          }
          $summaryPath = Join-Path $env:RUNNER_TEMP "aggregator-effective-summary.json"
          python ./scripts/easyproxy_source_audit.py `
            --audit-id "aggregator-effective-${{ github.run_id }}" `
            --subscription "$baseUrl/subs/clash.yaml" `
            --output-path $summaryPath `
            --docker-network-name "EasyAiMi" `
            --keep-artifacts
          "EASYPROXY_AGGREGATOR_EFFECTIVE_AUDIT_SUMMARY=$summaryPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Publish effective aggregator artifact
        if: steps.change_gate.outputs.should_deploy == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python scripts/publish-aggregator-effective.py \
            --runtime-config upstreams/aggregator/subscribe/config/config.actions.runtime.json \
            --audit-summary "${EASYPROXY_AGGREGATOR_EFFECTIVE_AUDIT_SUMMARY}"

      - name: Verify effective aggregator artifact
        if: steps.change_gate.outputs.should_deploy == 'true' && steps.deploy_mode.outputs.run_verification == 'true'
        shell: bash
        env:
          EASYPROXY_AGGREGATOR_PUBLIC_BASE_URL: ${{ vars.EASYPROXY_AGGREGATOR_PUBLIC_BASE_URL }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import requests
          from pathlib import Path

          runtime = json.loads(Path("upstreams/aggregator/subscribe/config/config.actions.runtime.json").read_text(encoding="utf-8"))
          base_url = "${EASYPROXY_AGGREGATOR_PUBLIC_BASE_URL}".rstrip("/")
          items = (runtime.get("storage") or {}).get("items") or {}
          for item_name in ("public-effective", "public-effective-json"):
              item = items.get(item_name) or {}
              key = str(item.get("key") or "").strip()
              if not key:
                  raise RuntimeError(f"missing storage key for {item_name}")
              url = f"{base_url}/{key.lstrip('/')}"
              response = requests.get(url, timeout=30)
              response.raise_for_status()
              body = response.text.strip()
              if not body:
                  raise RuntimeError(f"{item_name} is empty: {url}")
              print(f"verified {url}")
          PY

      - name: Upload aggregator workflow log
        if: always() && steps.change_gate.outputs.should_deploy == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: aggregator-workflow-log
          path: upstreams/aggregator/workflow.log
          if-no-files-found: ignore

      - name: Write deployment summary
        if: steps.change_gate.outputs.should_deploy == 'true'
        shell: bash
        env:
          EASYPROXY_AGGREGATOR_PUBLIC_BASE_URL: ${{ vars.EASYPROXY_AGGREGATOR_PUBLIC_BASE_URL }}
        run: |
          {
            echo "## Aggregator deploy completed"
            echo
            echo "- mode: \`${{ steps.deploy_mode.outputs.mode }}\`"
            echo "- verification: \`${{ steps.deploy_mode.outputs.run_verification }}\`"
            echo "- public base url: \`${EASYPROXY_AGGREGATOR_PUBLIC_BASE_URL:-n/a}\`"
            echo "- reason: \`${{ steps.change_gate.outputs.reason }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

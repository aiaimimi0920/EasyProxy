# EasyProxy monorepo operator config
#
# Copy this file to `config.yaml` and fill in the values you actually use.
# Root-level operator scripts read only `config.yaml`; they render any
# module-specific config files they need at runtime.

serviceBase:
  context: .
  dockerfile: deploy/service/base/Dockerfile
  image: easyproxy/easy-proxy-monorepo-service:local
  composeFile: deploy/service/base/docker-compose.yaml
  renderedConfigPath: deploy/service/base/config.yaml
  networkName: EasyAiMi
  runtime:
    mode: hybrid
    log_level: info
    skip_cert_verify: false
    database_path: /var/lib/easy-proxy/data/data.db
    listener:
      address: 0.0.0.0
      port: 22323
      protocol: http
      username: ""
      password: ""
    pool:
      mode: auto
      failure_threshold: 3
      blacklist_duration: 24h
    multi_port:
      address: 0.0.0.0
      base_port: 25000
      protocol: http
      username: ""
      password: ""
    management:
      enabled: true
      listen: 0.0.0.0:29888
      probe_targets:
      - https://connectivitycheck.gstatic.com/generate_204
      - https://cp.cloudflare.com/generate_204
      - https://www.msftconnecttest.com/connecttest.txt
      - https://www.google.com/generate_204
      password: ""
    subscription_refresh:
      enabled: true
      interval: 2h0m0s
      timeout: 30s
      health_check_timeout: 1m0s
      drain_timeout: 30s
      min_available_nodes: 1
    source_sync:
      enabled: true
      manifest_url: https://misub.example.com/api/manifest/your-profile
      manifest_token: ""
      refresh_interval: 5m0s
      request_timeout: 15s
      default_direct_proxy_scheme: http
      fallback_subscriptions:
        - https://sub.aiaimimi.com/subs/effective.txt
      connector_runtime:
        enabled: true
        binary_path: /usr/local/bin/ech-workers
        working_directory: /var/lib/easy-proxy/connectors
        listen_host: 127.0.0.1
        listen_start_port: 30000
        startup_timeout: 30s
        preferred_ip:
          binary_path: /usr/local/bin/cfst
          ip_file_path: /usr/local/share/cfst/ip.txt
          working_directory: /var/lib/easy-proxy/connectors/preferred-ip
          timeout: 5m0s
          fanout_count: 5
    connectors:
      - name: ECH Worker Template
        input: https://your-ech-worker.example.com:443
        enabled: false
        template_only: true
        group: ECH Connectors
        notes: Local template for generating preferred Cloudflare entry IP connectors
        connector_type: ech_worker
        connector_config:
          local_protocol: socks5
          access_token: ""
    subscriptions:
      - https://example.com/subscription-1

misub:
  projectRoot: upstreams/misub
  pages:
    projectName: misub-git
    branch: main
    publicUrl: https://misub.example.com
    callbackUrl: https://misub.example.com
    d1DatabaseName: misub
    d1DatabaseBinding: MISUB_DB
    verifyManifestProfileId: default
    connectorProfileId: easyproxies-ech-runtime
    additionalSubscriptions: []
  docker:
    composeFile: upstreams/misub/docker-compose.yml
    envOutput: upstreams/misub/.env
    env:
      ADMIN_PASSWORD: change_me_to_a_strong_password
      COOKIE_SECRET: change_me_to_a_random_64_char_hex_string
      MANIFEST_TOKEN: change_me_to_a_random_token
      MISUB_PUBLIC_URL: https://misub.example.com
      MISUB_CALLBACK_URL: https://misub.example.com
      CORS_ORIGINS: ""
      NODE_TLS_REJECT_UNAUTHORIZED: ""

aggregator:
  projectRoot: upstreams/aggregator
  workflowFile: deploy-aggregator.yml
  ref: main
  configPath: deploy/upstreams/aggregator/config/config.actions.r2.json
  publicBaseUrl: https://sub.example.com
  effectiveUrl: https://sub.example.com/subs/effective.txt
  r2:
    accountId: ""
    accessKeyId: ""
    secretAccessKey: ""

cloudflare:
  accountId: ""
  authEmail: ""
  globalApiKey: ""
  apiToken: ""

ghcr:
  owner: your-github-owner
  platform: linux/amd64
  serviceImageName: easy-proxy-monorepo-service
  echWorkersImageName: ech-workers-monorepo

echWorkers:
  image: easyproxy/ech-workers-monorepo:local
  dockerfile: deploy/upstreams/ech-workers/Dockerfile
  context: .

echWorkersCloudflare:
  projectRoot: workers/ech-workers-cloudflare
  wranglerConfig: workers/ech-workers-cloudflare/wrangler.jsonc
  devVarsOutput: workers/ech-workers-cloudflare/.dev.vars
  publicUrl: https://proxyservice-ech-workers.example.com
  preferredEntryIps: []
  secrets:
    ECH_TOKEN: ""

distribution:
  serviceBase:
    accountId: ""
    bucket: easyproxy-private
    endpoint: ""
    configObjectKey: service-base/config.yaml
    manifestObjectKey: service-base/manifest.json
    accessKeyId: ""
    secretAccessKey: ""
    readAccessKeyId: ""
    readSecretAccessKey: ""
